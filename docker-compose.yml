name: ohmyagentteam

services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: ohmyagentteam
      POSTGRES_USER: ${POSTGRES_USER:-ohmyagentteam}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ohmyagentteam}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
