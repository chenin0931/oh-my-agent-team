version: 2

project_name: omat

builds:
  - id: omat
    main: ./cmd/omat
    dir: server
    binary: omat
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: versioned
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}-cli-{{ .Version }}-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - name: omat
    ids:
      - versioned
    repository:
      owner: chenin0931
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/chenin0931/oh-my-agent-team"
    description: "OhMyAgentTeam CLI — connect and manage local agent runtimes"
    install: |
      bin.install "omat"
    test: |
      system "#{bin}/omat", "version"
